<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 680" width="520" height="680">
  <defs>
    <style>
      text { font-family: 'PingFang SC', 'Hiragino Sans GB', 'Heiti SC', sans-serif; }
    </style>
  </defs>
  <rect width="520" height="680" fill="#fafafa"/>

  <!-- TITLE -->
  <text x="260" y="25" text-anchor="middle" font-size="15" font-weight="700">TITLE_HERE</text>

  <!-- ===== MAIN STRUCTURE ===== -->
  <!-- Outer shell -->
  <ellipse cx="260" cy="310" rx="165" ry="180" fill="none" stroke="#000" stroke-width="2.5"/>

  <!-- Inner structure 1 -->
  <ellipse cx="260" cy="310" rx="145" ry="160" fill="#fff" stroke="#999" stroke-width="1.0"/>

  <!-- Internal detail region -->
  <ellipse cx="260" cy="310" rx="80" ry="40" fill="#ddd" stroke="#555" stroke-width="1.5"/>

  <!-- Core -->
  <ellipse cx="260" cy="310" rx="30" ry="15" fill="#000"/>

  <!-- ===== LABEL SYSTEM ===== -->
  <!-- Top label -->
  <line x1="260" y1="130" x2="260" y2="90" stroke="#000" stroke-width="0.8"/>
  <circle cx="260" cy="130" r="2.5" fill="#000"/>
  <text x="268" y="85" font-size="12" font-weight="700">TOP_STRUCTURE</text>
  <text x="268" y="101" font-size="10" fill="#555">function_note</text>

  <!-- Right label -->
  <line x1="425" y1="310" x2="470" y2="310" stroke="#000" stroke-width="0.8"/>
  <circle cx="425" cy="310" r="2.5" fill="#000"/>
  <text x="475" y="306" font-size="12" font-weight="700">RIGHT_STRUCTURE</text>
  <text x="475" y="322" font-size="10" fill="#555">function_note</text>

  <!-- Bottom label -->
  <line x1="260" y1="490" x2="260" y2="540" stroke="#000" stroke-width="0.8"/>
  <circle cx="260" cy="490" r="2.5" fill="#000"/>
  <text x="268" y="535" font-size="12" font-weight="700">BOTTOM_STRUCTURE</text>
  <text x="268" y="551" font-size="10" fill="#555">function_note</text>

  <!-- Left label -->
  <line x1="95" y1="350" x2="50" y2="370" stroke="#000" stroke-width="0.8"/>
  <circle cx="95" cy="350" r="2.5" fill="#000"/>
  <text x="45" y="365" text-anchor="end" font-size="12" font-weight="700">LEFT_STRUCTURE</text>
  <text x="45" y="381" text-anchor="end" font-size="10" fill="#555">function_note</text>

  <!-- ===== DIRECTIONAL ARROW ===== -->
  <path d="M30,310 L90,310" stroke="#000" stroke-width="1.5" marker-end="url(#arrowRight)"/>
  <text x="60" y="298" text-anchor="middle" font-size="10" fill="#555">DIRECTION →</text>

  <!-- ===== FOOTER ===== -->
  <text x="260" y="670" text-anchor="middle" font-size="9" fill="#999">图：PROJECTION_NOTE。为清晰展示，结构比例非严格解剖比例。</text>
</svg>
