<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 680" width="520" height="680">
  <defs><style>text{font-family:'PingFang SC','Hiragino Sans GB','Heiti SC',sans-serif}</style></defs>
  <rect width="520" height="680" fill="#fafafa"/>
  <text x="260" y="26" text-anchor="middle" font-size="15" font-weight="700">图：兔——基于参考照片比例重建</text>

  <!-- Ground line -->
  <line x1="80" y1="580" x2="440" y2="580" stroke="#999" stroke-width="0.8" stroke-dasharray="4,4"/>

  <!-- BODY -- main dark region from photo: area ~14000px, fills lower-left 2/3 of image -->
  <ellipse cx="240" cy="390" rx="110" ry="130" fill="#fff" stroke="#000" stroke-width="2.5"/>
  <!-- Belly lighter area -->
  <ellipse cx="240" cy="415" rx="65" ry="85" fill="#ddd" stroke="none"/>

  <!-- HEAD -- top-right of body, photo dark region 2 showed (412,154)-(473,251) -->
  <ellipse cx="310" cy="230" rx="62" ry="58" fill="#fff" stroke="#000" stroke-width="2.5"/>

  <!-- Cheek puff -->
  <path d="M255,245 Q248,258 255,268" fill="none" stroke="#000" stroke-width="1.5"/>
  <path d="M255,220 Q245,215 248,205" fill="none" stroke="#555" stroke-width="0.8"/>

  <!-- EYE -->
  <ellipse cx="330" cy="218" rx="8" ry="10" fill="#000"/>
  <circle cx="333" cy="215" r="3" fill="#fff"/>
  <circle cx="328" cy="222" r="1.5" fill="#fff"/>

  <!-- NOSE -->
  <ellipse cx="358" cy="240" rx="5" ry="4" fill="#555"/>

  <!-- MOUTH -->
  <path d="M350,248 Q355,256 362,252" fill="none" stroke="#000" stroke-width="1.0"/>

  <!-- WHISKERS -->
  <line x1="360" y1="236" x2="390" y2="232" stroke="#555" stroke-width="0.8"/>
  <line x1="362" y1="240" x2="392" y2="242" stroke="#555" stroke-width="0.8"/>
  <line x1="360" y1="244" x2="388" y2="250" stroke="#555" stroke-width="0.8"/>

  <!-- LEFT EAR -- extending from head up-left -->
  <path d="M275,185 Q265,100 280,55 Q290,50 295,58 Q298,70 290,100 Q290,150 292,180" fill="#fff" stroke="#000" stroke-width="2.3"/>
  <path d="M280,175 Q272,105 283,62 Q288,55 292,60" fill="#ddd" stroke="none"/>

  <!-- RIGHT EAR -- extending from head up, slightly behind -->
  <path d="M310,185 Q320,95 330,50 Q338,45 342,52 Q345,60 335,95 Q328,150 320,182" fill="#fff" stroke="#000" stroke-width="2.0"/>
  <path d="M316,178 Q322,100 330,55 Q336,48 338,53" fill="#ddd" stroke="none"/>

  <!-- NECK -->
  <path d="M280,260 Q275,295 275,320" fill="none" stroke="#000" stroke-width="1.5"/>
  <path d="M310,270 Q320,300 325,330" fill="none" stroke="#000" stroke-width="1.5"/>

  <!-- FRONT LEGS -->
  <path d="M280,350 Q265,430 260,510 Q258,550 265,570 Q270,580 280,580" fill="none" stroke="#000" stroke-width="2.5"/>
  <!-- front paw -->
  <path d="M280,580 Q285,590 295,590 Q300,585 298,578" fill="none" stroke="#000" stroke-width="1.8"/>

  <path d="M310,360 Q320,440 325,510 Q327,545 320,565 Q315,580 305,580" fill="none" stroke="#000" stroke-width="2.3"/>
  <path d="M305,580 Q300,590 292,590 Q286,585 288,578" fill="none" stroke="#000" stroke-width="1.8"/>

  <!-- BACK LEG (visible behind body, on right) -->
  <path d="M195,440 Q175,490 170,550 Q168,570 178,578 Q185,582 192,578" fill="none" stroke="#000" stroke-width="2.5"/>
  <path d="M192,578 Q198,586 205,584 Q210,578 208,570" fill="none" stroke="#000" stroke-width="1.5"/>

  <!-- HIND LEG (visible in foreground) -->
  <path d="M170,430 Q155,480 158,535 Q160,565 170,578 Q180,584 190,580" fill="none" stroke="#000" stroke-width="2.8"/>
  <path d="M190,580 Q200,590 210,586 Q215,578 210,568" fill="none" stroke="#000" stroke-width="1.8"/>
  <!-- Thigh muscle -->
  <path d="M165,450 Q155,490 152,510" fill="none" stroke="#555" stroke-width="0.8"/>

  <!-- TAIL -->
  <circle cx="140" cy="410" r="18" fill="#fff" stroke="#000" stroke-width="1.8"/>
  <circle cx="140" cy="410" r="10" fill="#ddd" stroke="none"/>

  <!-- LABELS -->
  <!-- Ear label -->
  <line x1="285" y1="75" x2="170" y2="42" stroke="#000" stroke-width="0.8"/>
  <circle cx="285" cy="75" r="2.5" fill="#000"/>
  <text x="165" y="35" text-anchor="end" font-size="12" font-weight="700">耳廓</text>
  <text x="165" y="50" text-anchor="end" font-size="10" fill="#555">长耳·听觉灵敏</text>

  <!-- Eye label -->
  <line x1="338" y1="208" x2="420" y2="180" stroke="#000" stroke-width="0.8"/>
  <circle cx="338" cy="208" r="2.5" fill="#000"/>
  <text x="425" y="175" font-size="12" font-weight="700">眼</text>
  <text x="425" y="191" font-size="10" fill="#555">侧位·广角视野</text>

  <!-- Hind leg label -->
  <line x1="155" y1="520" x2="80" y2="500" stroke="#000" stroke-width="0.8"/>
  <circle cx="155" cy="520" r="2.5" fill="#000"/>
  <text x="75" y="493" text-anchor="end" font-size="12" font-weight="700">后肢</text>
  <text x="75" y="508" text-anchor="end" font-size="10" fill="#555">跖行·跳跃力</text>

  <!-- Tail label -->
  <line x1="125" y1="400" x2="55" y2="380" stroke="#000" stroke-width="0.8"/>
  <circle cx="125" cy="400" r="2.5" fill="#000"/>
  <text x="50" y="373" text-anchor="end" font-size="12" font-weight="700">尾</text>
  <text x="50" y="388" text-anchor="end" font-size="10" fill="#555">短绒球·scut</text>

  <!-- Footer -->
  <text x="260" y="668" text-anchor="middle" font-size="9" fill="#999">图：兔——参照照片暗区分析重建比例 · 物体图示例 · DPT-CP1 四级灰度</text>
</svg>
