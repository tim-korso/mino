<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 420" width="600" height="420">
  <defs>
    <style>
      text { font-family: 'PingFang SC', 'Hiragino Sans GB', 'Heiti SC', sans-serif; }
    </style>
    <marker id="arrowFlow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>
  <rect width="600" height="420" fill="#fafafa"/>
  <text x="300" y="22" text-anchor="middle" font-size="13" font-weight="700">TITLE_HERE</text>

  <!-- Node 1 -->
  <rect x="25" y="45" width="130" height="55" rx="6" fill="#000"/>
  <text x="90" y="67" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">NODE_1</text>
  <text x="90" y="84" text-anchor="middle" font-size="8" fill="#ccc">subtitle_1</text>

  <!-- Arrow 1→2 -->
  <line x1="155" y1="72" x2="215" y2="72" stroke="#000" stroke-width="1.5" marker-end="url(#arrowFlow)"/>
  <text x="185" y="63" text-anchor="middle" font-size="8" fill="#555">cause_1</text>

  <!-- Node 2 -->
  <rect x="220" y="45" width="130" height="55" rx="6" fill="#333"/>
  <text x="285" y="67" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">NODE_2</text>
  <text x="285" y="84" text-anchor="middle" font-size="8" fill="#ccc">subtitle_2</text>

  <!-- Arrow 2→3 -->
  <line x1="350" y1="72" x2="410" y2="72" stroke="#000" stroke-width="1.5" marker-end="url(#arrowFlow)"/>
  <text x="380" y="63" text-anchor="middle" font-size="8" fill="#555">cause_2</text>

  <!-- Node 3 -->
  <rect x="415" y="45" width="130" height="55" rx="6" fill="#555"/>
  <text x="480" y="67" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">NODE_3</text>
  <text x="480" y="84" text-anchor="middle" font-size="8" fill="#ccc">subtitle_3</text>

  <!-- Downward spiral (optional) -->
  <path d="M480,100 L480,160" stroke="#000" stroke-width="1" stroke-dasharray="4,3"/>

  <rect x="200" y="165" width="170" height="50" rx="6" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <text x="285" y="190" text-anchor="middle" font-size="10" font-weight="700">BREAKER_LABEL</text>
  <text x="285" y="205" text-anchor="middle" font-size="8">解决策略描述</text>

  <!-- Bottom insight -->
  <rect x="80" y="375" width="440" height="35" rx="4" fill="#000"/>
  <text x="300" y="397" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">BOTTOM_LINE_HERE</text>
</svg>
