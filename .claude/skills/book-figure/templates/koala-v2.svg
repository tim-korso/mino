<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 680" width="520" height="680">
  <defs><style>text{font-family:'PingFang SC','Hiragino Sans GB','Heiti SC',sans-serif}</style></defs>
  <rect width="520" height="680" fill="#fafafa"/>
  <text x="260" y="26" text-anchor="middle" font-size="15" font-weight="700">图：考拉（树袋熊）——形态学特征示意 v2</text>

  <!-- Tree trunk -->
  <rect x="80" y="480" width="70" height="200" fill="#fff" stroke="#000" stroke-width="2.0" rx="3"/>
  <path d="M85,500 Q95,495 100,505" fill="none" stroke="#555" stroke-width="0.6"/>
  <path d="M90,540 Q100,535 105,545" fill="none" stroke="#555" stroke-width="0.6"/>
  <!-- Tree texture -->
  <path d="M110,490 L145,495" fill="none" stroke="#999" stroke-width="0.5"/>

  <!-- BODY — stocky, rounded, clinging to trunk -->
  <ellipse cx="220" cy="360" rx="90" ry="110" fill="#fff" stroke="#000" stroke-width="2.5"/>
  <!-- Belly -->
  <ellipse cx="220" cy="385" rx="48" ry="65" fill="#ddd" stroke="none"/>

  <!-- HEAD — large, ~1/3 of body, facing profile -->
  <ellipse cx="200" cy="230" rx="72" ry="65" fill="#fff" stroke="#000" stroke-width="2.5"/>

  <!-- LEFT EAR (visible) — huge, round, fluffy, ~1/3 head width -->
  <ellipse cx="140" cy="180" rx="38" ry="42" fill="#fff" stroke="#000" stroke-width="2.3"/>
  <ellipse cx="140" cy="180" rx="22" ry="28" fill="#ddd" stroke="none"/>
  <!-- Ear fluff detail -->
  <path d="M110,170 Q106,164 112,160" fill="none" stroke="#000" stroke-width="1.0" stroke-linecap="round"/>
  <path d="M105,182 Q100,178 106,174" fill="none" stroke="#000" stroke-width="1.0" stroke-linecap="round"/>
  <path d="M108,194 Q104,198 110,202" fill="none" stroke="#000" stroke-width="1.0" stroke-linecap="round"/>
  <path d="M118,205 Q114,212 120,212" fill="none" stroke="#000" stroke-width="1.0" stroke-linecap="round"/>

  <!-- RIGHT EAR (partially visible behind head) -->
  <ellipse cx="240" cy="175" rx="30" ry="35" fill="#fff" stroke="#000" stroke-width="1.8"/>
  <ellipse cx="240" cy="175" rx="16" ry="22" fill="#ddd" stroke="none"/>

  <!-- EYE — small, dark -->
  <ellipse cx="175" cy="218" rx="7" ry="8" fill="#000"/>
  <circle cx="177" cy="216" r="2.5" fill="#fff"/>

  <!-- NOSE — very large, leathery, ~1/4 face, the defining koala feature -->
  <ellipse cx="228" cy="245" rx="24" ry="20" fill="#555" stroke="#000" stroke-width="1.8"/>
  <ellipse cx="222" cy="248" rx="4" ry="3" fill="#000"/>
  <ellipse cx="234" cy="248" rx="4" ry="3" fill="#000"/>
  <!-- Nose bridge -->
  <path d="M200,235 Q215,238 228,240" fill="none" stroke="#555" stroke-width="0.8"/>

  <!-- MOUTH -->
  <path d="M218,267 Q228,276 238,268" fill="none" stroke="#000" stroke-width="1.2"/>

  <!-- FRONT ARM — wrapping around trunk -->
  <path d="M150,300 Q130,340 120,390 Q112,430 115,470 Q118,495 125,500" fill="none" stroke="#000" stroke-width="2.8"/>
  <!-- Forearm detail -->
  <path d="M130,380 Q128,420 125,460" fill="none" stroke="#555" stroke-width="0.8"/>
  <!-- Paw gripping trunk -->
  <ellipse cx="128" cy="498" rx="16" ry="8" fill="#fff" stroke="#000" stroke-width="1.8"/>
  <line x1="118" y1="500" x2="114" y2="506" stroke="#000" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="125" y1="503" x2="122" y2="510" stroke="#000" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="134" y1="503" x2="133" y2="510" stroke="#000" stroke-width="1.2" stroke-linecap="round"/>

  <!-- OTHER FRONT ARM (behind trunk, partial) -->
  <path d="M155,305 Q145,350 140,400" fill="none" stroke="#555" stroke-width="1.5"/>

  <!-- BACK LEG — gripping trunk -->
  <path d="M190,440 Q175,475 160,500 Q150,515 142,518" fill="none" stroke="#000" stroke-width="2.8"/>
  <ellipse cx="140" cy="515" rx="14" ry="7" fill="#fff" stroke="#000" stroke-width="1.8"/>
  <line x1="132" y1="517" x2="128" y2="523" stroke="#000" stroke-width="1.0" stroke-linecap="round"/>
  <line x1="140" y1="520" x2="138" y2="527" stroke="#000" stroke-width="1.0" stroke-linecap="round"/>

  <!-- OTHER BACK LEG -->
  <path d="M260,440 Q275,470 280,495 Q282,510 278,518" fill="none" stroke="#555" stroke-width="1.8"/>
  <ellipse cx="276" cy="516" rx="12" ry="6" fill="#fff" stroke="#555" stroke-width="1.2"/>

  <!-- Fluffy texture on body -->
  <path d="M160,310 Q155,315 158,320" fill="none" stroke="#999" stroke-width="0.6"/>
  <path d="M155,345 Q150,350 153,355" fill="none" stroke="#999" stroke-width="0.6"/>
  <path d="M280,340 Q285,345 282,350" fill="none" stroke="#999" stroke-width="0.6"/>

  <!-- LABELS -->
  <!-- Ear -->
  <line x1="140" y1="138" x2="60" y2="105" stroke="#000" stroke-width="0.8"/>
  <circle cx="140" cy="138" r="2.5" fill="#000"/>
  <text x="55" y="98" text-anchor="end" font-size="12" font-weight="700">耳廓</text>
  <text x="55" y="113" text-anchor="end" font-size="10" fill="#555">大而圆·绒毛密布</text>

  <!-- Nose — key feature -->
  <line x1="252" y1="245" x2="350" y2="210" stroke="#000" stroke-width="0.8"/>
  <circle cx="252" cy="245" r="2.5" fill="#000"/>
  <text x="355" y="205" font-size="12" font-weight="700">鼻镜 (rhinarium)</text>
  <text x="355" y="221" font-size="10" fill="#555">大而裸露·革质·占面1/4</text>

  <!-- Trunk grip -->
  <line x1="125" y1="495" x2="50" y2="470" stroke="#000" stroke-width="0.8"/>
  <circle cx="125" cy="495" r="2.5" fill="#000"/>
  <text x="45" y="463" text-anchor="end" font-size="11" font-weight="700">握枝</text>
  <text x="45" y="478" text-anchor="end" font-size="9" fill="#555">对生指·强爪·抱握</text>

  <!-- Pouch -->
  <line x1="200" y1="435" x2="100" y2="450" stroke="#000" stroke-width="0.8"/>
  <circle cx="200" cy="435" r="2" fill="#000"/>
  <text x="95" y="443" text-anchor="end" font-size="10" font-weight="700">育儿袋</text>
  <text x="95" y="458" text-anchor="end" font-size="9" fill="#555">有袋类·开口向下</text>

  <!-- Diet note -->
  <text x="380" y="360" font-size="10" font-weight="700">食性</text>
  <text x="380" y="376" font-size="9" fill="#555">专食桉叶</text>
  <text x="380" y="390" font-size="9" fill="#555">低营养·日睡18-20h</text>

  <!-- Footer -->
  <text x="260" y="668" text-anchor="middle" font-size="9" fill="#999">图：考拉——攀附树干姿态 · 物体图示例 v2 · DPT-CP1 四级灰度</text>
</svg>
