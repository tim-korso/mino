<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 360" width="560" height="360">
  <defs>
    <style>
      text { font-family: 'PingFang SC', 'Hiragino Sans GB', 'Heiti SC', sans-serif; }
    </style>
  </defs>
  <rect width="560" height="360" fill="#fafafa"/>
  <text x="280" y="22" text-anchor="middle" font-size="13" font-weight="700">TITLE_HERE</text>

  <!-- Y-axis -->
  <line x1="100" y1="80" x2="100" y2="310" stroke="#000" stroke-width="1"/>
  <text x="25" y="200" text-anchor="middle" font-size="10" font-weight="700" transform="rotate(-90,25,200)">Y_LABEL</text>

  <!-- Bars (4-column layout: 50px per bar + 70px gap) -->
  <!-- Bar 1 -->
  <rect x="120" y="BAR1_Y" width="50" height="BAR1_H" fill="#333"/>
  <text x="145" y="BAR1_Y-7" text-anchor="middle" font-size="10" font-weight="700">VALUE1</text>
  <text x="145" y="328" text-anchor="middle" font-size="9">LABEL1</text>

  <!-- Bar 2 -->
  <rect x="220" y="BAR2_Y" width="50" height="BAR2_H" fill="#666"/>
  <text x="245" y="BAR2_Y-7" text-anchor="middle" font-size="10" font-weight="700">VALUE2</text>
  <text x="245" y="328" text-anchor="middle" font-size="9">LABEL2</text>

  <!-- Bar 3 -->
  <rect x="320" y="BAR3_Y" width="50" height="BAR3_H" fill="#999"/>
  <text x="345" y="BAR3_Y-7" text-anchor="middle" font-size="10" font-weight="700">VALUE3</text>
  <text x="345" y="328" text-anchor="middle" font-size="9">LABEL3</text>

  <!-- Bar 4 -->
  <rect x="420" y="BAR4_Y" width="50" height="BAR4_H" fill="#ccc" stroke="#000" stroke-width="1"/>
  <text x="445" y="BAR4_Y-7" text-anchor="middle" font-size="10" font-weight="700">VALUE4</text>
  <text x="445" y="328" text-anchor="middle" font-size="9">LABEL4</text>

  <!-- Bottom note -->
  <text x="60" y="348" font-size="7" fill="#555">NOTE_HERE</text>
</svg>
