# macOS Automation Pipeline — passwordless sudo whitelist
# v2: +5 diagnostic tools (SIP-gated for Apple processes, full access for non-Apple)
# 安装: sudo cp /tmp/macos-automation-sudoers-v2 /etc/sudoers.d/macos-automation
# 验证: sudo -l

# ═══ 系统只读工具 (v1) ═══
%admin ALL=(ALL) NOPASSWD: /usr/sbin/dtrace
%admin ALL=(ALL) NOPASSWD: /usr/bin/fs_usage
%admin ALL=(ALL) NOPASSWD: /usr/bin/powermetrics
%admin ALL=(ALL) NOPASSWD: /usr/bin/tmutil
%admin ALL=(ALL) NOPASSWD: /usr/sbin/nvram
%admin ALL=(ALL) NOPASSWD: /usr/sbin/diskutil

# ═══ Xcode 诊断工具 (v2) ═══
# 对非 Apple 进程: 全权限。对 Apple 系统进程: 被 SIP 拦截 (设计如此)
%admin ALL=(ALL) NOPASSWD: /Applications/Xcode.app/Contents/Developer/usr/bin/sample
%admin ALL=(ALL) NOPASSWD: /Applications/Xcode.app/Contents/Developer/usr/bin/heap
%admin ALL=(ALL) NOPASSWD: /Applications/Xcode.app/Contents/Developer/usr/bin/leaks
%admin ALL=(ALL) NOPASSWD: /Applications/Xcode.app/Contents/Developer/usr/bin/vmmap
%admin ALL=(ALL) NOPASSWD: /Applications/Xcode.app/Contents/Developer/usr/bin/malloc_history
